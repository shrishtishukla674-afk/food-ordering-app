<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FoodIt | Cart</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;700&family=Nunito:wght@500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="hero-body">
  <div class="cart-box">
    <h1>Your Cart</h1>
    <ul id="cart-items" class="cart-items"></ul>
    <p id="cart-total" class="cart-total">Total: INR 0</p>

    <div class="page-actions">
      <button class="next-btn" onclick="clearCart()" type="button">Clear Cart</button>
      <button class="primary-btn" onclick="checkoutCart()" type="button">Checkout</button>
      <button class="back-btn" onclick="goBack()" type="button">Back</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
